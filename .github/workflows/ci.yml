name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 app_horaire.py horaire_agent.py conges_bosa.py agenda_agent.py \
            --max-line-length=120 --ignore=E501,W503 --count

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          DATA_DIR: /tmp/horaire-test
